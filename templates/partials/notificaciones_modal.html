<!-- MODAL NOTIFICACIONES DEL SISTEMA -->
<div class="modal fade" id="modalNotificacionesSistema" tabindex="-1" aria-labelledby="modalNotificacionesLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal text-white" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--accent-blue); border-radius: 16px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-cap" id="modalNotificacionesLabel">
                    <i class="fas fa-bell text-warning me-2 animate-bounce"></i>Notificaciones de Mi Cuenta
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body py-4">
                <div class="d-flex flex-column gap-3">
                    {% for notif in notificaciones_sistema %}
                        <div class="p-3 rounded border" style="background: rgba(255, 255, 255, 0.02); border-color: {% if notif.tipo == 'warning' %}rgba(255, 193, 7, 0.25){% else %}rgba(43, 125, 233, 0.25){% endif %} !important;">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <i class="fas {{ notif.icono }} {% if notif.tipo == 'warning' %}text-warning{% else %}text-info{% endif %}"></i>
                                    <h6 class="mb-0 fw-bold text-white">{{ notif.titulo }}</h6>
                                </div>
                                <span class="badge {% if notif.tipo == 'warning' %}bg-warning text-dark{% else %}bg-info text-white{% endif %} font-monospace" style="font-size: 0.65rem;">
                                    {{ notif.badge }}
                                </span>
                            </div>
                            <p class="text-white-50 small mb-0">{{ notif.mensaje }}</p>
                        </div>
                    {% empty %}
                        <div class="text-center py-4 text-white-50">
                            <i class="fas fa-bell-slash fa-2x mb-3 opacity-25"></i>
                            <p class="mb-0">No tienes notificaciones en este momento.</p>
                        </div>
                    {% endfor %}
                </div>
            </div>
            <div class="modal-footer border-0 pt-0 justify-content-center">
                <button type="button" class="btn btn-outline-info btn-sm fw-bold px-4 rounded-pill" data-bs-dismiss="modal">
                    Entendido
                </button>
            </div>
        </div>
    </div>
</div>
