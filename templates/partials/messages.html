{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3 custom-toast-container">
    {% for msg in messages %}
        <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show shadow-lg border-0 custom-toast-alert toast-msg-{% if 'info' in msg.tags %}info{% elif 'error' in msg.tags or 'danger' in msg.tags %}error{% elif 'warning' in msg.tags %}warning{% else %}default{% endif %}"
             role="alert">
            <i class="fas {% if 'info' in msg.tags %}fa-check-circle text-info{% elif 'error' in msg.tags or 'danger' in msg.tags %}fa-exclamation-circle text-danger{% elif 'warning' in msg.tags %}fa-exclamation-triangle text-warning{% else %}fa-info-circle text-info{% endif %} me-2 fs-5 custom-toast-icon"></i>
            {{ msg }}
            <button type="button" onclick="this.closest('.alert').remove();" class="custom-toast-close">
                <i class="fas fa-times"></i>
            </button>
        </div>
    {% endfor %}
</div>
{% endif %}
