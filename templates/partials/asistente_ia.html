{% load static %}

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0A84FF;--brand-dark:#0060DD;
  --surface:#141417;--surface2:#1C1C21;--surface3:#25252C;
  --border:rgba(255,255,255,0.08);
  --text:#F5F5F7;--muted:rgba(255,255,255,0.42);
  --green:#34D399;--red:#FF453A;--radius:20px;
  --font:'DM Sans',sans-serif;
}

#tux-toggle {
    position: fixed !important;
    bottom: 28px !important;
    right: 90px !important;
    z-index: 9999;
    width: 54px !important;
    height: 54px !important;
    border-radius: 50% !important;
    background: linear-gradient(135deg, #0A84FF, #0060DD) !important;
    color: #fff !important;
    border: none !important;
    box-shadow: 0 4px 20px rgba(10, 132, 255, 0.45);
    cursor: pointer;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: transform 0.25s, box-shadow 0.25s;
}
#tux-toggle:hover {
    transform: scale(1.12) rotate(-10deg);
    box-shadow: 0 6px 28px rgba(10, 132, 255, 0.65);
}

.chat-window{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;height:580px;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
  max-width:380px;
  position: fixed !important;
  bottom: 94px !important;
  right: 28px !important;
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85) translateY(20px);
  transform-origin: bottom right;
  transition: opacity 0.25s cubic-bezier(0.34,1.56,0.64,1), transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.chat-window.open {
  opacity: 1;
  pointer-events: all;
  transform: scale(1) translateY(0);
}

.chat-header{
  display:flex;align-items:center;gap:11px;
  padding:13px 16px;
  background:var(--surface2);border-bottom:0.5px solid var(--border);
}
.cat-avatar{
  width:40px;height:40px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,#0A84FF,#0060DD);
  display:flex;align-items:center;justify-content:center;
}
.header-info{flex:1}
.header-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:.01em}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(52,211,153,.1);border:0.5px solid rgba(52,211,153,.22);
  border-radius:20px;padding:3px 9px;
  font-size:10px;font-weight:600;color:var(--green);letter-spacing:.05em;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.72)}}

/* Voz pill para header */
.voice-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,69,58,.08);border:0.5px solid rgba(255,69,58,.2);
  border-radius:20px;padding:3px 9px;
  font-size:10px;font-weight:600;color:var(--red);letter-spacing:.05em;
  cursor:pointer;
  transition:background .15s,border-color .15s;
  display:none;
}
.voice-pill.visible{ display:flex; }
.voice-pill .pulse-red{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  animation:pulse-red 0.8s ease-in-out infinite;
}
@keyframes pulse-red{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}

.modules {
  display: flex;
  gap: 8px;
  padding: 12px 14px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  flex-wrap: wrap;
  justify-content: flex-start;
}
.chip {
  background: var(--surface3);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s, transform .1s;
}
.chip:hover {
  background: rgba(10,132,255,.12);
  color: var(--brand);
  border-color: rgba(10,132,255,.3);
}
.chip:active { transform: scale(.95); }

.messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:13px;
  scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

.date-div{
  text-align:center;font-size:10px;color:var(--muted);letter-spacing:.06em;
  position:relative;margin:4px 0;
}
.date-div::before,.date-div::after{
  content:'';position:absolute;top:50%;width:28%;height:0.5px;background:var(--border);
}
.date-div::before{left:0}.date-div::after{right:0}

.msg-row{display:flex;gap:9px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.msg-av{
  width:28px;height:28px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#0A84FF,#0060DD);
  display:flex;align-items:center;justify-content:center;
}
.bubble{max-width:80%;padding:10px 13px;font-size:13px;line-height:1.55;color:var(--text)}
.bubble.bot{background:var(--surface3);border:0.5px solid var(--border);border-radius:16px 16px 16px 3px}
.bubble.user{background:var(--brand);border-radius:16px 16px 3px 16px;color:#fff}
.bubble strong{font-weight:600}
.btime{font-size:10px;color:var(--muted);margin-top:3px;display:block}
.btime.right{text-align:right}

/* Indicador de escucha */
.listen-bubble{
  background:rgba(255,69,58,.08);
  border:0.5px solid rgba(255,69,58,.3);
  border-radius:16px 16px 16px 3px;
  padding:10px 14px;
  font-size:13px;
  color:var(--red);
  display:flex;align-items:center;gap:8px;
  max-width:80%;
}
.listen-waves{display:flex;gap:3px;align-items:center;height:18px}
.listen-waves span{
  width:3px;border-radius:3px;background:var(--red);
  animation:wave 0.8s ease-in-out infinite;
}
.listen-waves span:nth-child(1){height:6px;animation-delay:0s}
.listen-waves span:nth-child(2){height:14px;animation-delay:0.1s}
.listen-waves span:nth-child(3){height:10px;animation-delay:0.2s}
.listen-waves span:nth-child(4){height:16px;animation-delay:0.3s}
.listen-waves span:nth-child(5){height:8px;animation-delay:0.4s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}

/* Indicador Tux hablando */
.speaking-row .bubble.bot{
  border-color:rgba(10,132,255,.35);
  background:rgba(10,132,255,.1);
}

.typing-bubble{background:var(--surface3);border:0.5px solid var(--border);border-radius:16px 16px 16px 3px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:bounce 1.2s ease-in-out infinite}
.typing-bubble span:nth-child(2){animation-delay:.18s}
.typing-bubble span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.42}40%{transform:translateY(-5px);opacity:1}}

.input-area{padding:11px 13px 13px;background:var(--surface2);border-top:0.5px solid var(--border)}
.input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface3);border:0.5px solid var(--border);
  border-radius:13px;padding:5px 7px 5px 13px;
  transition:border-color .15s;
}
.input-wrap:focus-within{border-color:rgba(10,132,255,.5)}
.input-wrap.listening{border-color:rgba(255,69,58,.5);background:rgba(255,69,58,.04)}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font);font-size:13px;color:var(--text);padding:6px 0;
}
.chat-input::placeholder{color:var(--muted)}

/* Botón micrófono */
.mic-btn{
  width:36px;height:36px;border-radius:11px;
  background:var(--surface2);border:0.5px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s,border-color .15s;flex-shrink:0;
}
.mic-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.mic-btn:active{transform:scale(.88)}
.mic-btn.active{
  background:rgba(255,69,58,.15);
  border-color:rgba(255,69,58,.5);
}
.mic-btn.active svg{stroke:var(--red);}

/* Botón hablar respuesta */
.speak-btn{
  width:36px;height:36px;border-radius:11px;
  background:transparent;border:0.5px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s;flex-shrink:0;
}
.speak-btn:hover{background:rgba(255,255,255,.06)}
.speak-btn:active{transform:scale(.88)}
.speak-btn.speaking{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.4);}
.speak-btn.speaking svg{stroke:var(--brand);}

.send-btn{
  width:36px;height:36px;border-radius:11px;
  background:var(--brand);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s;flex-shrink:0;
}
.send-btn:hover{background:var(--brand-dark)}
.send-btn:active{transform:scale(.88)}

.input-footer{
  text-align:center;font-size:10px;color:var(--muted);
  margin-top:7px;letter-spacing:.03em;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.voice-support-badge{
  display:inline-flex;align-items:center;gap:3px;
  color:var(--green);font-size:10px;
}

.appear{animation:fadeup .22s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble.err{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.25);color:#FCA5A5}

/* Barra volumen lateral al hablar */
.tts-bar{
  position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;border-radius:3px;background:var(--brand);
  animation:tts-pulse 0.6s ease-in-out infinite alternate;
}
@keyframes tts-pulse{0%{height:8px;opacity:.5}100%{height:20px;opacity:1}}
</style>

<script>
// ══════════════════════════════════════════════
//  TOGGLE VENTANA
// ══════════════════════════════════════════════
const tuxToggle = document.getElementById('tux-toggle');
const chatWindow = document.querySelector('.chat-window');

tuxToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    chatWindow.classList.toggle('open');
});
document.addEventListener('click', (e) => {
    if (!chatWindow.contains(e.target) && e.target !== tuxToggle && !tuxToggle.contains(e.target)) {
        chatWindow.classList.remove('open');
    }
});

// ══════════════════════════════════════════════
//  CSRF
// ══════════════════════════════════════════════
function getCookie(name) {
    let val = null;
    if (document.cookie) {
        document.cookie.split(';').forEach(c => {
            c = c.trim();
            if (c.startsWith(name + '=')) val = decodeURIComponent(c.substring(name.length + 1));
        });
    }
    return val;
}

// ══════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════
let history = [];
let isListening = false;
let recognition = null;
let currentUtterance = null;
let ttsEnabled = true;  // Síntesis de voz activada por defecto

// ══════════════════════════════════════════════
//  SPEECH RECOGNITION (STT) — Web Speech API
// ══════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceBadge = document.getElementById('voiceBadge');
const voicePill = document.getElementById('voicePill');

if (SpeechRecognition) {
    voiceBadge.style.display = 'inline-flex';

    recognition = new SpeechRecognition();
    recognition.lang = 'es-CO';         // Español Colombia
    recognition.interimResults = true;  // Mostrar texto mientras habla
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById('micBtn').classList.add('active');
        document.getElementById('inputWrap').classList.add('listening');
        voicePill.classList.add('visible');
        document.getElementById('chatIn').placeholder = '🎙️ Te estoy escuchando...';
        showListenBubble();
    };

    recognition.onresult = (event) => {
        let interim = '';
        let final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) final += t;
            else interim += t;
        }
        // Mostrar en input lo que dice
        document.getElementById('chatIn').value = final || interim;
        updateListenBubble(final || interim);
    };

    recognition.onend = () => {
        isListening = false;
        document.getElementById('micBtn').classList.remove('active');
        document.getElementById('inputWrap').classList.remove('listening');
        voicePill.classList.remove('visible');
        document.getElementById('chatIn').placeholder = 'Pregúntame o usa el micrófono...';
        removeListenBubble();

        // Si hay texto en el input, enviarlo automáticamente
        const texto = document.getElementById('chatIn').value.trim();
        if (texto) {
            setTimeout(() => send(), 100);
        }
    };

    recognition.onerror = (event) => {
        isListening = false;
        document.getElementById('micBtn').classList.remove('active');
        document.getElementById('inputWrap').classList.remove('listening');
        voicePill.classList.remove('visible');
        removeListenBubble();
        document.getElementById('chatIn').placeholder = 'Pregúntame o usa el micrófono...';

        if (event.error === 'not-allowed') {
            addMsg('🎙️ Permiso de micrófono denegado. Actívalo en la configuración del navegador.', 'bot', now());
        } else if (event.error !== 'no-speech') {
            addMsg(`⚠️ Error de voz: ${event.error}`, 'bot', now());
        }
    };
}

function toggleMic() {
    if (!SpeechRecognition) {
        addMsg('⚠️ Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.', 'bot', now());
        return;
    }
    if (isListening) {
        recognition.stop();
    } else {
        // Parar TTS si está hablando
        stopSpeaking();
        recognition.start();
    }
}

// ── Burbuja de escucha visual ──
let listenRow = null;
function showListenBubble() {
    const msgs = document.getElementById('msgs');
    listenRow = document.createElement('div');
    listenRow.id = 'listen-row';
    listenRow.className = 'msg-row appear';
    listenRow.innerHTML = `${catAv()}<div>
      <div class="listen-bubble">
        <div class="listen-waves"><span></span><span></span><span></span><span></span><span></span></div>
        <span id="listenText" class="ai-u-2">Escuchando...</span>
      </div>
    </div>`;
    msgs.appendChild(listenRow);
    msgs.scrollTop = msgs.scrollHeight;
}
function updateListenBubble(text) {
    const lt = document.getElementById('listenText');
    if (lt) lt.textContent = text || 'Escuchando...';
}
function removeListenBubble() {
    const r = document.getElementById('listen-row');
    if (r) r.remove();
    listenRow = null;
}

// ══════════════════════════════════════════════
//  SPEECH SYNTHESIS (TTS) — Web Speech API
// ══════════════════════════════════════════════
function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    stopSpeaking();

    // Limpiar markdown básico para leer más natural
    const clean = text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/<[^>]+>/g, '')
        .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .substring(0, 500); // Máx 500 chars para no ser muy largo

    currentUtterance = new SpeechSynthesisUtterance(clean);
    currentUtterance.lang = 'es-CO';
    currentUtterance.rate = 1.05;
    currentUtterance.pitch = 1.1;
    currentUtterance.volume = 1;

    // Intentar voz en español si hay disponible
    const voices = window.speechSynthesis.getVoices();
    const esVoice = voices.find(v => v.lang.startsWith('es') && v.localService)
        || voices.find(v => v.lang.startsWith('es'));
    if (esVoice) currentUtterance.voice = esVoice;

    currentUtterance.onstart = () => {
        // Marcar la última burbuja bot como hablando
        const botBubbles = document.querySelectorAll('.msg-row:not(.user)');
        if (botBubbles.length) botBubbles[botBubbles.length - 1].classList.add('speaking-row');
    };
    currentUtterance.onend = () => {
        document.querySelectorAll('.speaking-row').forEach(r => r.classList.remove('speaking-row'));
        currentUtterance = null;
    };

    window.speechSynthesis.speak(currentUtterance);
}

function stopSpeaking() {
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.speaking-row').forEach(r => r.classList.remove('speaking-row'));
        currentUtterance = null;
    }
}

// Cargar voces (Chrome las carga async)
if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function now(){
    return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
}

function catAv(){
    return `<div class="msg-av"><svg width="14" height="14" viewBox="0 0 32 32" fill="none"><polygon points="6,13 10,4 14,13" fill="white" opacity=".9"/><polygon points="18,13 22,4 26,13" fill="white" opacity=".9"/><ellipse cx="16" cy="19" rx="10" ry="9" fill="white" opacity=".97"/><ellipse cx="12" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/><ellipse cx="20" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/></svg></div>`;
}

function addMsg(html, role, t, rawText){
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'msg-row appear' + (role==='user'?' user':'');

    if(role==='user'){
        row.innerHTML = `<div><div class="bubble user">${html}</div><span class="btime right">${t}</span></div>`;
    } else {
        // Botón para que Tux repita la respuesta en voz
        const speakBtnHtml = window.speechSynthesis
            ? `<button class="speak-btn" onclick="speakMessage(this, '${encodeURIComponent(rawText||html)}')" title="Escuchar respuesta" aria-label="Escuchar respuesta ai-u-3">
                 <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round">
                   <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                   <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                 </svg>
               </button>`
            : '';
        row.innerHTML = `${catAv()}<div class="ai-u-4"><div class="bubble bot">${html}</div><div class="ai-u-5"><span class="btime">${t}</span>${speakBtnHtml}</div></div>`;
    }
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
}

function speakMessage(btn, encodedText) {
    const text = decodeURIComponent(encodedText);
    if (currentUtterance) {
        stopSpeaking();
        btn.classList.remove('speaking');
        return;
    }
    btn.classList.add('speaking');

    const clean = text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/<[^>]+>/g,'');
    const u = new SpeechSynthesisUtterance(clean.substring(0, 500));
    u.lang = 'es-CO'; u.rate = 1.05; u.pitch = 1.1;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang.startsWith('es')&&v.localService)||voices.find(v=>v.lang.startsWith('es'));
    if(v) u.voice = v;
    u.onend = () => { btn.classList.remove('speaking'); currentUtterance=null; };
    currentUtterance = u;
    window.speechSynthesis.speak(u);
}

function addTyping(){
    const msgs=document.getElementById('msgs');
    const row=document.createElement('div');
    row.className='msg-row appear';
    row.id='typing-row';
    row.innerHTML=`${catAv()}<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    msgs.appendChild(row);
    msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
    const t=document.getElementById('typing-row');
    if(t)t.remove();
}

// ══════════════════════════════════════════════
//  ENVÍO DE MENSAJE
// ══════════════════════════════════════════════
function sendQuick(text){
    document.getElementById('chatIn').value=text;
    send();
}

async function send(){
    const input=document.getElementById('chatIn');
    const text=input.value.trim();
    if(!text) return;

    // Parar cualquier TTS en curso
    stopSpeaking();

    const t=now();
    addMsg(text,'user',t,text);
    history.push({"role":"user","content":text});
    input.value='';
    addTyping();

    try{
        const res = await fetch('/api/chat-tux/', {
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'X-CSRFToken':getCookie('csrftoken')
            },
            body:JSON.stringify({message:text, history:history})
        });

        const data = await res.json();
        removeTyping();

        if(data.error){
            const errMsg = `⚠️ ${data.error}`;
            addMsg(errMsg,'bot',now(),errMsg);
            return;
        }

        const reply = data.reply || "No recibí respuesta.";
        const safeReply = reply
            .replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\n/g,'<br>')
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>');

        history.push({"role":"assistant","content":reply});
        addMsg(safeReply,'bot',now(),reply);

        // ── Hablar la respuesta automáticamente ──
        speak(reply);

    } catch(e){
        removeTyping();
        const errMsg="🔌 No se pudo conectar con el servidor. Verifica que Django e ia_server.py estén corriendo.";
        addMsg(errMsg,'bot',now(),errMsg);
    }
}
</script>
