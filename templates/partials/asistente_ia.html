{% load static %}

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0A84FF;--brand-dark:#0060DD;
  --surface:#141417;--surface2:#1C1C21;--surface3:#25252C;
  --border:rgba(255,255,255,0.08);
  --text:#F5F5F7;--muted:rgba(255,255,255,0.42);
  --green:#34D399;--radius:20px;
  --font:'DM Sans',sans-serif;
}

#tux-toggle {
    position: fixed !important;
    bottom: 28px !important;
    right: 90px !important;
    z-index: 9999;
    width: 54px !important;
    height: 54px !important;
    border-radius: 50% !important;
    background: linear-gradient(135deg, #0A84FF, #0060DD) !important;
    color: #fff !important;
    border: none !important;
    box-shadow: 0 4px 20px rgba(10, 132, 255, 0.45);
    cursor: pointer;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: transform 0.25s, box-shadow 0.25s;
}
#tux-toggle:hover {
    transform: scale(1.12) rotate(-10deg);
    box-shadow: 0 6px 28px rgba(10, 132, 255, 0.65);
}

.chat-window{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;height:560px;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
  max-width:380px;
  position: fixed !important;
  bottom: 94px !important;
  right: 28px !important;
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85) translateY(20px);
  transform-origin: bottom right;
  transition: opacity 0.25s cubic-bezier(0.34,1.56,0.64,1), transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.chat-window.open {
  opacity: 1;
  pointer-events: all;
  transform: scale(1) translateY(0);
}

.chat-header{
  display:flex;align-items:center;gap:11px;
  padding:13px 16px;
  background:var(--surface2);border-bottom:0.5px solid var(--border);
}
.cat-avatar{
  width:40px;height:40px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,#0A84FF,#0060DD);
  display:flex;align-items:center;justify-content:center;
}
.header-info{flex:1}
.header-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:.01em}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(52,211,153,.1);border:0.5px solid rgba(52,211,153,.22);
  border-radius:20px;padding:3px 9px;
  font-size:10px;font-weight:600;color:var(--green);letter-spacing:.05em;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.72)}}

.modules {
  display: flex;
  gap: 8px;
  padding: 12px 14px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  flex-wrap: wrap;
  justify-content: flex-start;
}
.modules::-webkit-scrollbar { display: none; }
.chip {
  background: var(--surface3);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s, transform .1s;
}
.chip:hover {
  background: rgba(10,132,255,.12);
  color: var(--brand);
  border-color: rgba(10,132,255,.3);
}
.chip:active { transform: scale(.95); }

.messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:13px;
  scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

.date-div{
  text-align:center;font-size:10px;color:var(--muted);letter-spacing:.06em;
  position:relative;margin:4px 0;
}
.date-div::before,.date-div::after{
  content:'';position:absolute;top:50%;width:28%;height:0.5px;background:var(--border);
}
.date-div::before{left:0}.date-div::after{right:0}

.msg-row{display:flex;gap:9px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.msg-av{
  width:28px;height:28px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#0A84FF,#0060DD);
  display:flex;align-items:center;justify-content:center;
}
.bubble{max-width:80%;padding:10px 13px;font-size:13px;line-height:1.55;color:var(--text)}
.bubble.bot{background:var(--surface3);border:0.5px solid var(--border);border-radius:16px 16px 16px 3px}
.bubble.user{background:var(--brand);border-radius:16px 16px 3px 16px;color:#fff}
.bubble strong{font-weight:600}
.btime{font-size:10px;color:var(--muted);margin-top:3px;display:block}
.btime.right{text-align:right}

.typing-bubble{background:var(--surface3);border:0.5px solid var(--border);border-radius:16px 16px 16px 3px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:bounce 1.2s ease-in-out infinite}
.typing-bubble span:nth-child(2){animation-delay:.18s}
.typing-bubble span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.42}40%{transform:translateY(-5px);opacity:1}}

.input-area{padding:11px 13px 13px;background:var(--surface2);border-top:0.5px solid var(--border)}
.input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface3);border:0.5px solid var(--border);
  border-radius:13px;padding:5px 7px 5px 13px;
  transition:border-color .15s;
}
.input-wrap:focus-within{border-color:rgba(10,132,255,.5)}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font);font-size:13px;color:var(--text);padding:6px 0;
}
.chat-input::placeholder{color:var(--muted)}
.send-btn{
  width:36px;height:36px;border-radius:11px;
  background:var(--brand);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s;flex-shrink:0;
}
.send-btn:hover{background:var(--brand-dark)}
.send-btn:active{transform:scale(.88)}
.input-footer{text-align:center;font-size:10px;color:var(--muted);margin-top:7px;letter-spacing:.03em}

.appear{animation:fadeup .22s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble.err{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.25);color:#FCA5A5}
</style>

<button id="tux-toggle" aria-label="Abrir asistente IA">
    <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="6,13 10,4 14,13" fill="white" opacity=".95"/>
        <polygon points="18,13 22,4 26,13" fill="white" opacity=".95"/>
        <ellipse cx="16" cy="19" rx="10" ry="9" fill="white" opacity=".97"/>
        <ellipse cx="12" cy="18" rx="1.7" ry="2" fill="#0A84FF"/>
        <ellipse cx="20" cy="18" rx="1.7" ry="2" fill="#0A84FF"/>
        <ellipse cx="16" cy="21.5" rx="1" ry=".7" fill="#0A84FF"/>
    </svg>
</button>

<div class="chat-window">

  <div class="chat-header">
    <div class="cat-avatar">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="6,13 10,4 14,13" fill="white" opacity=".95"/>
        <polygon points="18,13 22,4 26,13" fill="white" opacity=".95"/>
        <polygon points="7.5,12 10,6 12.5,12" fill="#0A84FF" opacity=".6"/>
        <polygon points="19.5,12 22,6 24.5,12" fill="#0A84FF" opacity=".6"/>
        <ellipse cx="16" cy="19" rx="10" ry="9" fill="white" opacity=".97"/>
        <ellipse cx="12" cy="18" rx="1.7" ry="2" fill="#0A84FF"/>
        <ellipse cx="20" cy="18" rx="1.7" ry="2" fill="#0A84FF"/>
        <ellipse cx="12.4" cy="18.3" rx=".7" ry="1" fill="#003080"/>
        <ellipse cx="20.4" cy="18.3" rx=".7" ry="1" fill="#003080"/>
        <ellipse cx="16" cy="21.5" rx="1" ry=".7" fill="#0A84FF"/>
        <path d="M14.5 22.2 Q16 23.5 17.5 22.2" stroke="#0A84FF" stroke-width=".8" fill="none" stroke-linecap="round"/>
        <line x1="5" y1="20.5" x2="12" y2="21.2" stroke="white" stroke-width=".7" opacity=".7"/>
        <line x1="5" y1="22" x2="12" y2="21.8" stroke="white" stroke-width=".7" opacity=".7"/>
        <line x1="20" y1="21.2" x2="27" y2="20.5" stroke="white" stroke-width=".7" opacity=".7"/>
        <line x1="20" y1="21.8" x2="27" y2="22" stroke="white" stroke-width=".7" opacity=".7"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">Tux</div>
      <div class="header-sub">SENA Centro Minero</div>
    </div>
    <div class="status-pill"><span class="pulse"></span>En línea</div>
  </div>

  <div class="modules">
    <button class="chip" onclick="sendQuick('¿Cuántas reservas hay pendientes en el gimnasio?')">🏋️ Gimnasio</button>

    <button class="chip" onclick="sendQuick('¿Cuántos torneos de interfichas hay activos?')">📋 Interfichas</button>
    <button class="chip" onclick="sendQuick('¿Qué elementos hay en el inventario deportivo?')">📦 Inventario</button>
  </div>

  <div class="messages" id="msgs">
    <div class="date-div">HOY</div>
    <div class="msg-row appear">
      <div class="msg-av">
        <svg width="14" height="14" viewBox="0 0 32 32" fill="none">
          <polygon points="6,13 10,4 14,13" fill="white" opacity=".9"/>
          <polygon points="18,13 22,4 26,13" fill="white" opacity=".9"/>
          <ellipse cx="16" cy="19" rx="10" ry="9" fill="white" opacity=".97"/>
          <ellipse cx="12" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/>
          <ellipse cx="20" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/>
        </svg>
      </div>
      <div>
        <div class="bubble bot">¡Hola! 🐱 Soy <strong>Tux</strong>, tu asistente IA del SENA. Estoy conectado a la base de datos. ¿En qué te ayudo hoy?</div>
        <span class="btime">ahora</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input class="chat-input" id="chatIn" type="text" placeholder="Pregúntame sobre el sistema..." onkeydown="if(event.key==='Enter')send()"/>
      <button class="send-btn" onclick="send()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">Tux · Gestión Deportiva SENA · Motor IA propio</div>
  </div>
</div>

<script>
const tuxToggle = document.getElementById('tux-toggle');
const chatWindow = document.querySelector('.chat-window');

tuxToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    chatWindow.classList.toggle('open');
});

document.addEventListener('click', (e) => {
    if (!chatWindow.contains(e.target) && e.target !== tuxToggle && !tuxToggle.contains(e.target)) {
        chatWindow.classList.remove('open');
    }
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

let history = [];

function now(){
  return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
}

function catAv(){
  return `<div class="msg-av"><svg width="14" height="14" viewBox="0 0 32 32" fill="none"><polygon points="6,13 10,4 14,13" fill="white" opacity=".9"/><polygon points="18,13 22,4 26,13" fill="white" opacity=".9"/><ellipse cx="16" cy="19" rx="10" ry="9" fill="white" opacity=".97"/><ellipse cx="12" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/><ellipse cx="20" cy="18" rx="1.5" ry="1.8" fill="#0A84FF"/></svg></div>`;
}

function addMsg(html, role, t){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row appear' + (role==='user'?' user':'');
  if(role==='user'){
    row.innerHTML=`<div><div class="bubble user">${html}</div><span class="btime right">${t}</span></div>`;
  } else {
    row.innerHTML=`${catAv()}<div><div class="bubble bot">${html}</div><span class="btime">${t}</span></div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
  return row;
}

function addTyping(){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='msg-row appear';
  row.id='typing-row';
  row.innerHTML=`${catAv()}<div class="typing-bubble"><span></span><span></span><span></span></div>`;
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-row');
  if(t)t.remove();
}

function sendQuick(text){
  document.getElementById('chatIn').value=text;
  send();
}

async function send(){
  const input=document.getElementById('chatIn');
  const text=input.value.trim();
  if(!text)return;

  const t=now();
  addMsg(text,'user',t);
  history.push({"role": "user", "content": text});
  input.value='';
  addTyping();

  try{
    const res = await fetch('/api/chat-tux/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ message: text, history: history })
    });

    const data = await res.json();
    removeTyping();

    if(data.error){
      addMsg(`⚠️ ${data.error}`, 'bot', now());
      return;
    }

    const reply = data.reply || "No recibí respuesta.";
    const safeReply = reply
      .replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>');

    history.push({"role": "assistant", "content": reply});
    addMsg(safeReply, 'bot', now());

  } catch(e){
    removeTyping();
    addMsg("🔌 No se pudo conectar con el servidor. Verifica que Django e ia_server.py estén corriendo.", 'bot', now());
  }
}
</script>
