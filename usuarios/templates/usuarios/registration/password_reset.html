{% extends "base.html" %}
{% block content %}
<div class="main-container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="sport-card text-center" style="max-width: 450px; border-top: 4px solid var(--accent-blue);">
        <div class="mb-4">
            <i class="fas fa-key fa-3x text-info"></i>
        </div>
        <h3 class="text-white fw-bold mb-3">¿OLVIDASTE TU CLAVE?</h3>
        <p class="text-white-50 mb-4">Ingresa tu correo institucional o personal. Te enviaremos un enlace seguro para restablecer tu contraseña.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small fw-bold">CORREO ELECTRÓNICO</label>
                <input type="email" name="email" class="custom-input form-control" placeholder="nombre@correo.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-lg">
                <i class="fas fa-paper-plane me-2"></i>ENVIAR ENLACE DE RECUPERACIÓN
            </button>
        </form>
        
        <div class="mt-4">
            <a href="{% url 'home' %}" class="text-white-50 small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
