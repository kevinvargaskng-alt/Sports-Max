{% extends "base.html" %}
{% block content %}
<div class="main-container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="sport-card text-center" style="max-width: 450px; border-top: 4px solid var(--accent-blue);">
        <div class="mb-4">
            <i class="fas fa-envelope-open-text fa-4x text-warning"></i>
        </div>
        <h3 class="text-white fw-bold">¡CORREO ENVIADO!</h3>
        <p class="text-white-50 mt-3">
            Si existe una cuenta con el correo ingresado, recibirás un mensaje en unos instantes.
        </p>
        <div class="alert alert-info bg-dark border-info text-info small mt-4">
            <i class="fas fa-info-circle me-2"></i>Si no lo ves, revisa tu carpeta de <strong>Correo no deseado (Spam)</strong>.
        </div>
        <a href="{% url 'home' %}" class="btn btn-outline-info w-100 mt-3 fw-bold">ENTENDIDO, VOLVER</a>
    </div>
</div>
{% endblock %}
